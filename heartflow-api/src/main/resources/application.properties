# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/heartflow
spring.datasource.username=heartflow_user
spring.datasource.password=heartflow_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=heartflow-secret-key-min-256-bits-long-change-in-production
jwt.expiration=86400000

# Claude API
claude.api.key=${CLAUDE_API_KEY:test}
claude.api.url=https://api.anthropic.com/v1/messages