version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: heartflow-db
    environment:
      POSTGRES_DB: heartflow
      POSTGRES_USER: heartflow_user
      POSTGRES_PASSWORD: heartflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: